name: Build Zorrr Black APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # LANGKAH KUNCI: Membuat folder Android yang hilang otomatis
      - name: Reconstruct Project Layout
        run: |
          mkdir temp_dir
          flutter create --project-name=zorrr_black_ai ./temp_dir
          cp -r temp_dir/android ./android
          rm -rf temp_dir
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zorrr-black-apk
          path: build/app/outputs/flutter-apk/app-release.apk
