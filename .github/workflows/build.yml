name: Build Zorrr Black APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct and Build
        run: |
          # 1. Simpan kode main.dart Anda ke memori sementara
          cp lib/main.dart main_backup.dart
          
          # 2. Hapus sisa-sisa project yang berantakan
          rm -rf ./* .??*
          
          # 3. Buat project baru yang benar-benar bersih
          flutter create --project-name zorrr_black_ai .
          
          # 4. Suntikkan kembali kode sakti Anda dan dependensi
          rm lib/main.dart
          cp ../main_backup.dart lib/main.dart
          
          # 5. Tambahkan library HTTP (satu-satunya yang kita butuhkan sekarang)
          flutter pub add http
          
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zorrr-black-apk
          path: build/app/outputs/flutter-apk/app-release.apk
